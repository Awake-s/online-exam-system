# ========================================================================
# 在线考试系统 - 性能压测专用配置（Spring Profile: perf）
# ========================================================================
# 用途：并发压测时启用，配合 v2.0 实施方案
# 隔离：① 数据库切换到 online_exam_system_perf（与开发库 100% 分离）
#       ② Redis 切换到 db1（开发数据保留在 db0 不动）
#       ③ HikariCP 连接池调大，适应压测场景
#       ④ MyBatis-Plus SQL 日志关闭，避免拖慢压测
# 启用：mvn spring-boot:run -Dspring-boot.run.profiles=perf
#       或：mvn test -Dspring.profiles.active=perf
# 回退：删除本文件即可（Spring Boot 自动 fallback 到 dev profile）
# ========================================================================

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/online_exam_system_perf?useUnicode=true&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&rewriteBatchedStatements=true
    username: root
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 压测专用 HikariCP 配置（默认 10 不够，提到 50）
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000
      max-lifetime: 1800000
      idle-timeout: 600000
      pool-name: PerfHikariCP

  # Redis 隔离：使用 db1，开发的 db0 完全不受压测影响
  # 注意：Spring Boot 2.7.18 前缀为 spring.redis.*（非 spring.data.redis.*，后者 3.0 才改名、2.7 下不生效）
  redis:
    host: localhost
    port: 6379
    database: 1                       # ⚠ 关键隔离点：db1 != dev 的 db0
    timeout: 2000ms
    connect-timeout: 2000ms
    client-name: exam-system-perf     # CLIENT LIST 可见，便于排障
    lettuce:
      pool:
        enabled: true
        max-active: 16                # 压测增大（dev 是 8）
        max-idle: 16
        min-idle: 4
        max-wait: 2000ms
        time-between-eviction-runs: 60000ms
      shutdown-timeout: 100ms

# 压测时关闭 MyBatis SQL 日志，避免日志 IO 拖慢响应时间
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT 配置（与 dev 一致，保证 Token 兼容）
jwt:
  secret: ${JWT_SECRET:YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026}
  expiration: 86400000

upload:
  path: ./uploads/

# 百度语音（保持与 dev 一致）
baidu:
  speech:
    app-id: ${BAIDU_APP_ID:}
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}

# Actuator：压测期间暴露更多监控端点，方便采集指标
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,httptrace,threaddump,heapdump,env
  endpoint:
    health:
      show-details: always
  metrics:
    enable:
      jvm: true
      system: true
      process: true
      tomcat: true
      http: true
      hikaricp: true
