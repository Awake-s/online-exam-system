spring:
  datasource:
    url: jdbc:mysql://localhost:3306/online_exam_system?useUnicode=true&connectionCollation=utf8mb4_general_ci&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: ${DB_PASSWORD:12345678}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis 显式配置（阿里开发规约 §4.1 强制：拒绝隐式默认值）
  # 业务归属：JWT 黑名单 / 消息幂等 / 权限缓存 / Typing 限流 / 撤回草稿 / 通知去重 6 大场景
  # 参考：doc/技术栈分析/Redis在线考试系统深度使用分析与权威方案.md
  # 参考：doc/技术栈分析/Redis进阶优化指南_从权威到完美.md
  #
  # 【命名空间】Spring Boot 2.7.18 的 Redis 连接前缀是 spring.redis.*（不是 spring.data.redis.*）。
  #   spring.data.redis.* 是 Spring Boot 3.0 才改的名；2.7.x 下写成 spring.data.redis 会被忽略、退回默认 localhost:6379 无密码。
  #   官方文档 v2.7.18 data/nosql 明确用 spring.redis.{host,port,password,...}
  redis:
    host: localhost
    port: 6379
    database: 0                         # db0 独占本项目
    # ▼ commandTimeout：单命令超时（从 5s 压到 2s，快速失败 > 慢等）
    #   业务代码全部有 try-catch 降级，2s 仍是正常 <1ms 的 2000 倍安全空间。
    timeout: 2000ms
    # ▼ connect-timeout：TCP 建连超时
    connect-timeout: 2000ms
    client-name: exam-system-dev        # CLIENT LIST 可见，便于排障
    lettuce:
      pool:
        enabled: true
        max-active: 8                   # (CPU核 × 2) + 2
        max-idle: 8
        min-idle: 0
        max-wait: 2000ms                # 拿不到连接快速失败（从 5s 压到 2s）
        time-between-eviction-runs: 60000ms
      # ▼ shutdown-timeout：恢复 Spring Data Redis 官方默认 100ms（从 5s 下调）
      #   参考 https://docs.spring.io/spring-data/redis/docs/current/api/.../LettuceClientConfiguration.html
      #   官方默认："Shutdown Timeout 100 Milliseconds"。过长会拖慢应用优雅停止。
      shutdown-timeout: 100ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ${JWT_SECRET:YourSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026}
  expiration: 86400000

upload:
  path: ./uploads/

# 百度语音识别配置（https://ai.baidu.com/tech/speech 免费领取）
baidu:
  speech:
    app-id: ${BAIDU_APP_ID:}
    api-key: ${BAIDU_API_KEY:}
    secret-key: ${BAIDU_SECRET_KEY:}
