# ============================================================
# 在线考试系统 Nginx 配置（HTTP 版）
#
# 权威依据：
#   - OWASP Secure Headers Project
#     https://owasp.org/www-project-secure-headers/
#   - NGINX Hardening Checklist 2025
#     https://gixy.org/guides/nginx-hardening-checklist
#   - Mozilla SSL Configuration Generator（HTTPS 版见 nginx-https.conf）
#
# 使用场景：
#   - 备案前（香港服务器或 IP 访问）
#   - 内部测试
#   - HTTPS 证书申请前的过渡阶段
#
# 部署：
#   sudo cp nginx.conf /etc/nginx/sites-available/exam-system
#   sudo cp nginx-ratelimit.conf /etc/nginx/conf.d/00-exam-ratelimit.conf
#   sudo ln -sf /etc/nginx/sites-available/exam-system /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# ⚠️ 备案完成并获得 HTTPS 证书后，切换到 nginx-https.conf
# ============================================================

# ---------- 限流 zone（必须放在 http 块，由 conf.d/00-exam-ratelimit.conf 提供） ----------
# 如果本文件单独使用，请将以下两行剪切到 /etc/nginx/conf.d/00-exam-ratelimit.conf：
#   limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
#   limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# ---------- 自定义日志格式（含响应时间，便于排障） ----------
# 如果本文件单独使用，请将以下 log_format 剪切到 /etc/nginx/conf.d/00-exam-logformat.conf：
#   log_format exam_access '$remote_addr - $remote_user [$time_local] '
#                          '"$request" $status $body_bytes_sent '
#                          '"$http_referer" "$http_user_agent" '
#                          'rt=$request_time uct="$upstream_connect_time" '
#                          'uht="$upstream_header_time" urt="$upstream_response_time"';

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # ---------- 访问/错误日志（使用自定义格式） ----------
    access_log /var/log/nginx/exam-access.log exam_access buffer=32k flush=5s;
    error_log  /var/log/nginx/exam-error.log warn;

    # ---------- 前端静态文件 ----------
    root /opt/exam-system/frontend/dist;
    index index.html;

    # ---------- 全局限制 ----------
    client_max_body_size 20m;
    client_body_buffer_size 128k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ---------- OWASP 安全响应头 ----------
    # 依据：https://owasp.org/www-project-secure-headers/
    # HSTS：HTTPS 版才有效，但提前加入（防将来忘记配）
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # CSP：考试系统不需要跨域脚本，但 SPA 有 inline style，保守配置
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' ws: wss:; media-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ---------- Gzip 压缩 ----------
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml application/xml+rss
        image/svg+xml font/ttf font/otf font/woff font/woff2;
    gzip_disable "msie6";

    # ---------- SPA 前端路由 ----------
    location / {
        # 限流：所有页面请求 20r/s（突发 50）
        limit_req zone=api_limit burst=50 nodelay;

        try_files $uri $uri/ /index.html;

        # 静态资源缓存（Vite 构建产物带 hash，可长期缓存）
        location ~* \.(?:js|css|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            access_log off;
        }
        location ~* \.(?:png|jpg|jpeg|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
            access_log off;
        }
        # HTML 不缓存（确保更新生效）
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires off;
        }
    }

    # ---------- 登录接口限流（防暴力破解） ----------
    location = /api/auth/login {
        # 限流：每分钟 5 次（防撞库）
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8081/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ---------- 后端 API 反向代理 ----------
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 普通 API 超时（非 WebSocket）
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 上传大文件支持
        client_max_body_size 20m;
        proxy_request_buffering off;
    }

    # ---------- WebSocket：聊天 ----------
    location /ws {
        proxy_pass http://127.0.0.1:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接（禁用缓冲降低延迟）
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------- WebSocket：通知 ----------
    location /ws/notification {
        proxy_pass http://127.0.0.1:8081/ws/notification;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---------- 用户上传文件（透传） ----------
    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ---------- Actuator 健康检查（仅本机） ----------
    location = /actuator/health {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8081/actuator/health;
        access_log off;
    }

    # ---------- 禁止访问隐藏文件/敏感文件 ----------
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ ~$ {
        deny all;
        return 404;
    }
    location ~* \.(?:sh|bash|env|log|sql|conf|bak|old|swp)$ {
        deny all;
        return 404;
    }

    # ---------- 错误页面 ----------
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
