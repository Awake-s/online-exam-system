# ============================================================
# 在线考试系统 Nginx 配置（HTTPS 版 · examplatform.online）
#
# 本文件基于 nginx-https.conf 修正，专为 examplatform.online 上线 HTTPS 使用。
# 修正点（相对 nginx-https.conf）：
#   1. 域名 examplatform.online（已从旧域名迁移）
#   2. 证书路径 examplatform.online
#   3. HSTS max-age 63072000(2年) → 300(5分钟)  ⚠ 首次上线安全观察期
#      稳定运行 3 天后再逐步加大（见 examplatform-HTTPS上线方案.md 第四章）
#
# 权威依据：
#   - Mozilla SSL Configuration Generator (Intermediate)
#     https://ssl-config.mozilla.org/
#   - OWASP Secure Headers Project
#     https://owasp.org/www-project-secure-headers/
#   - Let's Encrypt + certbot 官方最佳实践
#
# 前置条件：
#   1. 域名 examplatform.online + www.examplatform.online 已解析到本服务器
#   2. 已用 certbot 申请证书（见 examplatform-HTTPS上线方案.md Step 3）
#   3. 证书位于 /etc/letsencrypt/live/examplatform.online/
#
# 部署：
#   sudo cp nginx-examplatform-https.conf /etc/nginx/sites-available/exam-system
#   sudo ln -sf /etc/nginx/sites-available/exam-system /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# ---------- 证书续期 Hook（certbot 成功后自动 reload nginx） ----------
# 编辑 /etc/letsencrypt/renewal/examplatform.online.conf 添加：
#   renew_hook = systemctl reload nginx

# ---------- HTTP → HTTPS 强制跳转 ----------
server {
    listen 80;
    listen [::]:80;
    server_name examplatform.online www.examplatform.online;

    # Let's Encrypt HTTP-01 续期挑战专用路径（不要跳转）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # 其他所有请求 301 跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------- HTTPS 主站 ----------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name examplatform.online www.examplatform.online;

    # ==================== SSL 证书 ====================
    ssl_certificate     /etc/letsencrypt/live/examplatform.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/examplatform.online/privkey.pem;

    # ==================== Mozilla Intermediate TLS 配置 ====================
    # 依据：https://ssl-config.mozilla.org/#server=nginx&config=intermediate
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # ==================== SSL 会话优化 ====================
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    # ==================== OCSP Stapling（证书状态提前下发） ====================
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/examplatform.online/chain.pem;
    resolver 223.5.5.5 223.6.6.6 valid=60s;  # 阿里 DNS（国内）
    resolver_timeout 2s;

    # ==================== 日志 ====================
    access_log /var/log/nginx/exam-access.log exam_access buffer=32k flush=5s;
    error_log  /var/log/nginx/exam-error.log warn;

    # ==================== 前端静态文件 ====================
    root /opt/exam-system/frontend/dist;
    index index.html;

    # ==================== 全局限制 ====================
    client_max_body_size 20m;
    client_body_buffer_size 128k;
    client_header_timeout 30s;
    client_body_timeout 60s;
    send_timeout 30s;
    keepalive_timeout 65s;
    keepalive_requests 1000;

    # ==================== OWASP 安全响应头（HTTPS 版） ====================
    # ⚠ HSTS：首次上线设 300 秒（5分钟）观察期，稳定后再加大！
    # 参考 examplatform-HTTPS上线方案.md 第四章
    add_header Strict-Transport-Security "max-age=300; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' wss:; media-src 'self' blob:; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
    # 隐藏 Nginx 版本
    server_tokens off;

    # ==================== Gzip ====================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml application/xml+rss
        image/svg+xml font/ttf font/otf font/woff font/woff2;

    # ==================== SPA 前端路由 ====================
    location / {
        limit_req zone=api_limit burst=50 nodelay;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:js|css|svg|woff2?|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000" always;
            access_log off;
        }
        location ~* \.(?:png|jpg|jpeg|gif|ico|webp)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000" always;
            access_log off;
        }
        location = /index.html {
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            expires off;
        }
    }

    # ==================== 登录接口限流 ====================
    location = /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:8081/api/auth/login;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ==================== 后端 API 反向代理 ====================
    location /api/ {
        limit_req zone=api_limit burst=100 nodelay;

        proxy_pass http://127.0.0.1:8081/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        client_max_body_size 20m;
        proxy_request_buffering off;
    }

    # ==================== WebSocket：聊天（wss://） ====================
    location /ws {
        proxy_pass http://127.0.0.1:8081/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==================== WebSocket：通知 ====================
    location /ws/notification {
        proxy_pass http://127.0.0.1:8081/ws/notification;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ==================== 用户上传文件 ====================
    location /uploads/ {
        proxy_pass http://127.0.0.1:8081/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ==================== Actuator 健康检查（仅本机） ====================
    location = /actuator/health {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8081/actuator/health;
        access_log off;
    }

    # ==================== 证书续期挑战路径（保留） ====================
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    # ==================== 禁止访问敏感文件 ====================
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ ~$ {
        deny all;
        return 404;
    }
    location ~* \.(?:sh|bash|env|log|sql|conf|bak|old|swp)$ {
        deny all;
        return 404;
    }

    # ==================== 错误页面 ====================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
