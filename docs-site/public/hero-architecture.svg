<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 420" width="600" height="420">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3c6fff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="600" height="420" rx="20" fill="url(#bgGrad)"/>

  <!-- 顶部浏览器栏装饰 -->
  <rect x="30" y="28" width="540" height="36" rx="8" fill="#ffffff" opacity="0.18"/>
  <circle cx="52" cy="46" r="5" fill="#ff6b6b" opacity="0.9"/>
  <circle cx="70" cy="46" r="5" fill="#ffd93d" opacity="0.9"/>
  <circle cx="88" cy="46" r="5" fill="#6bcf7f" opacity="0.9"/>

  <!-- 三端卡片 -->
  <g filter="url(#shadow)">
    <!-- 管理员 -->
    <rect x="40" y="90" width="160" height="130" rx="12" fill="#ffffff"/>
    <rect x="40" y="90" width="160" height="36" rx="12" fill="#2c5cff"/>
    <rect x="40" y="114" width="160" height="12" fill="#2c5cff"/>
    <text x="120" y="113" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">管理员端</text>
    <rect x="56" y="140" width="128" height="10" rx="5" fill="#e8eefc"/>
    <rect x="56" y="158" width="100" height="10" rx="5" fill="#e8eefc"/>
    <rect x="56" y="176" width="120" height="10" rx="5" fill="#e8eefc"/>
    <rect x="56" y="194" width="90" height="10" rx="5" fill="#e8eefc"/>

    <!-- 教师端 -->
    <rect x="220" y="90" width="160" height="130" rx="12" fill="#ffffff"/>
    <rect x="220" y="90" width="160" height="36" rx="12" fill="#7a5cff"/>
    <rect x="220" y="114" width="160" height="12" fill="#7a5cff"/>
    <text x="300" y="113" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">教师端</text>
    <rect x="236" y="140" width="128" height="10" rx="5" fill="#ede8fc"/>
    <rect x="236" y="158" width="110" height="10" rx="5" fill="#ede8fc"/>
    <rect x="236" y="176" width="124" height="10" rx="5" fill="#ede8fc"/>
    <rect x="236" y="194" width="96" height="10" rx="5" fill="#ede8fc"/>

    <!-- 学生端 -->
    <rect x="400" y="90" width="160" height="130" rx="12" fill="#ffffff"/>
    <rect x="400" y="90" width="160" height="36" rx="12" fill="#2c5cff"/>
    <rect x="400" y="114" width="160" height="12" fill="#2c5cff"/>
    <text x="480" y="113" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">学生端</text>
    <rect x="416" y="140" width="128" height="10" rx="5" fill="#e8eefc"/>
    <rect x="416" y="158" width="108" height="10" rx="5" fill="#e8eefc"/>
    <rect x="416" y="176" width="120" height="10" rx="5" fill="#e8eefc"/>
    <rect x="416" y="194" width="94" height="10" rx="5" fill="#e8eefc"/>
  </g>

  <!-- 连接线 -->
  <line x1="120" y1="220" x2="300" y2="260" stroke="#fff" stroke-width="2" opacity="0.6" stroke-dasharray="4 4"/>
  <line x1="300" y1="220" x2="300" y2="260" stroke="#fff" stroke-width="2" opacity="0.6" stroke-dasharray="4 4"/>
  <line x1="480" y1="220" x2="300" y2="260" stroke="#fff" stroke-width="2" opacity="0.6" stroke-dasharray="4 4"/>

  <!-- 后端层 -->
  <rect x="150" y="250" width="300" height="56" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <text x="300" y="276" fill="#2c5cff" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle">Spring Boot · API Gateway</text>
  <text x="300" y="294" fill="#666" font-family="sans-serif" font-size="11" text-anchor="middle">Security · JWT · WebSocket · MyBatis-Plus</text>

  <line x1="300" y1="306" x2="300" y2="326" stroke="#fff" stroke-width="2" opacity="0.6" stroke-dasharray="4 4"/>

  <!-- 数据层 -->
  <rect x="80" y="326" width="180" height="56" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <text x="170" y="352" fill="#2c5cff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">MySQL 8</text>
  <text x="170" y="370" fill="#666" font-family="sans-serif" font-size="11" text-anchor="middle">19 张表 · HikariCP</text>

  <rect x="340" y="326" width="180" height="56" rx="10" fill="#ffffff" filter="url(#shadow)"/>
  <text x="430" y="352" fill="#2c5cff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Redis</text>
  <text x="430" y="370" fill="#666" font-family="sans-serif" font-size="11" text-anchor="middle">缓存 · Token 黑名单</text>
</svg>
