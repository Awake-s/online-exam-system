# ====================================================================
# 项目官网 → GitHub Pages 自动部署（docs-site + landing）
# ====================================================================
# 触发：main 分支的 docs-site/、landing/ 或本文件有改动时
# 产物：发布到 GitHub Pages
#   - docs-site（VitePress）：https://awake-s.github.io/online-exam-system/
#   - landing（Astro）：      https://awake-s.github.io/online-exam-system/landing/
#
# 前置条件（在 GitHub 仓库一次性配置）：
#   Settings → Pages → Build and deployment → Source = "GitHub Actions"
# ====================================================================

name: Deploy Project Site

on:
  push:
    branches: [main, master]
    paths:
      - 'docs-site/**'
      - 'landing/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

# 允许 GitHub Pages 写入权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只跑一个部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # lastUpdated 需要完整历史

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ============ 构建 docs-site（VitePress） ============
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('docs-site/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install docs-site dependencies
        run: pnpm install --frozen-lockfile
        working-directory: docs-site

      - name: Build VitePress site
        run: pnpm run build
        working-directory: docs-site

      # ============ 构建 landing（Astro） ============
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('landing/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install landing dependencies
        run: npm ci
        working-directory: landing

      - name: Build Astro landing page
        run: npm run build
        working-directory: landing

      # ============ 合并产物 ============
      - name: Merge sites into Pages artifact
        shell: bash
        run: |
          mkdir -p _site
          # docs-site → 根路径
          cp -r docs-site/.vitepress/dist/* _site/
          # landing → /landing/ 子路径
          mkdir -p _site/landing
          cp -r landing/dist/* _site/landing/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
